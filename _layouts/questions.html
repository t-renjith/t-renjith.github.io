---
layout: default
---
<div class="p-12 px-12 flex items-center justify-center shadow-lg print:hidden">
    <h1 class="text-red-800 font-bold text-3xl md:text-5xl">{{ page_title | default: title }}</h1>
</div>

<div class="p-12 px-12">
    <div class="text-center">
        <h2 class="text-gray-900 font-bold text-xl md:text-2xl mb-1">
            {{ course }}
        </h2>
        <h2 class="text-gray-700 font-semibold text-xl md:text-2xl mb-1">
            {{ institute }}
        </h2>
        <h2 class="text-gray-600 text-lg md:text-xl mb-6">
            {{ semester }}
        </h2>
        <h2 class="text-red-800 font-bold text-xl md:text-2xl">
            {{ file_name }}
        </h2>
    </div>
    <div class="container mx-auto max-w-4xl py-2 print:max-w-full print:w-full print:p-0">
        <div
            class="markdown-content [&_h1]:text-4xl [&_h1]:font-bold [&_h1]:text-red-800 [&_h1]:mb-4 [&_h2]:text-2xl [&_h2]:font-semibold [&_h2]:text-gray-600 [&_h2]:border-b [&_h2]:border-gray-300 [&_h2]:pb-2 [&_h2]:mt-8 [&_h2]:mb-4 [&_h3]:text-xl [&_h3]:font-bold [&_h3]:text-red-800 [&_ul]:list-disc [&_ul]:ml-6 [&_ul]:mb-4 [&_ol]:list-decimal [&_ol]:ml-6 [&_ol]:mb-4 [&_li]:mb-1 [&_table]:w-full [&_table]:border-collapse [&_table]:mb-6 [&_td]:p-2 [&_td]:align-top [&_td]:text-left [&_th]:p-2 [&_th]:align-top [&_th]:text-left [&_p]:mb-4 [&_strong]:font-bold [&_a]:text-red-800 [&_a:hover]:underline">
            {{ content }}
        </div>
    </div>
</div>
