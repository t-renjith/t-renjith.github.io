---
layout: default
---
<div class="p-12 px-12 flex items-center justify-center shadow-lg print:hidden">
    <h1 class="text-red-800 font-bold text-3xl md:text-5xl">{{ page_title | default: title }}</h1>
</div>

<div class="container mx-auto max-w-4xl px-4 py-10 print:max-w-full print:w-full print:p-0">
    <style>
        .markdown-content h1 {
            font-size: 2.25rem;
            font-weight: 700;
            color: #991b1b;
            margin-bottom: 1rem;
        }

        .markdown-content h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #4b5563;
            border-bottom: 1px solid #d1d5db;
            padding-bottom: 0.5rem;
            margin-top: 2rem;
            margin-bottom: 1rem;
        }


        .markdown-content h3 {
            font-size: 1.25rem;
            font-weight: 700;
            color: #991b1b;
        }

        .markdown-content ul {
            list-style-type: disc;
            margin-left: 1.5rem;
            margin-bottom: 1rem;
        }

        .markdown-content li {
            margin-bottom: 0.25rem;
        }

        .markdown-content table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1.5rem;
        }

        .markdown-content td,
        .markdown-content th {
            padding: 0.5rem;
            vertical-align: top;
            text-align: left;
        }

        .markdown-content p {
            margin-bottom: 1rem;
        }

        .markdown-content strong {
            font-weight: 700;
        }

        .markdown-content a {
            color: #991b1b;
        }

        .markdown-content a:hover {
            text-decoration: underline;
        }
    </style>

    <div class="markdown-content">
        {{ content }}
    </div>
</div>
